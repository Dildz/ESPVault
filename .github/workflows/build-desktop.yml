name: Build desktop apps

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  package:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            script: package:win
            artifact: esp-board-vault-windows
          - name: macOS
            os: macos-latest
            script: package:mac
            artifact: esp-board-vault-macos
          - name: Linux
            os: ubuntu-latest
            script: package:linux
            artifact: esp-board-vault-linux

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Package desktop app
        run: npm run ${{ matrix.script }}

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.AppImage
            release/*.blockmap
            release/*.deb
            release/*.dmg
            release/*.exe
            release/*.tar.gz
            release/*.yml
            release/*.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create GitHub release
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged apps
        uses: actions/download-artifact@v4
        with:
          pattern: esp-board-vault-*
          path: release-artifacts
          merge-multiple: true

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-artifacts/* --clobber
          else
            gh release create "$TAG_NAME" release-artifacts/* \
              --title "ESP Board Vault $TAG_NAME" \
              --generate-notes
          fi
